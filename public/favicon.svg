<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1530"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>
  <!-- D Lettermark — centrado en 64x64, escala del viewBox 56x56 con offset 4px -->
  <g transform="translate(4, 4)">
    <!-- Barra vertical -->
    <line x1="15" y1="11" x2="15" y2="45" stroke="#7C5CFF" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Arco D -->
    <path d="M 15 13 C 38 12 47 20 47 28 C 47 36 38 44 15 43"
          stroke="#7C5CFF" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Halo del nodo -->
    <circle cx="47" cy="28" r="6" fill="#7C5CFF" fill-opacity="0.18"/>
    <!-- Nodo activo -->
    <circle cx="47" cy="28" r="3" fill="#7C5CFF"/>
  </g>
</svg>
